# ── NieR:Automata Terminal — Kitty Config ──

# Police
font_family      Share Tech Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# Espacement
letter_spacing   0.5
line_height      1.2

# Palette monochrome métallique
foreground            #d0d0d0
background            #141414
selection_foreground  #141414
selection_background  #a0a0a0

# Curseur
cursor                #cc0000
cursor_trail          3
cursor_trail_decay    0.1 0.4
cursor_text_color     #141414
cursor_shape          block
cursor_blink_interval 0.8

# Couleurs ANSI — monochrome métallique
color0  #141414
color1  #cc0000
color2  #7a7a7a
color3  #a0a0a0
color4  #4a4a4a
color5  #7a7a7a
color6  #a0a0a0
color7  #d0d0d0
color8  #2f2f2f
color9  #ff3333
color10 #8f8f8f
color11 #b4b4b4
color12 #6e6e6e
color13 #8f8f8f
color14 #b4b4b4
color15 #f0f0f0

# Fenêtre
window_padding_width     20
background_opacity       0.92
dynamic_background_color no

# Scrollback
scrollback_lines 5000

# Onglets — on les cache (sobre)
tab_bar_style hidden

# Pas de bell
enable_audio_bell no
visual_bell_duration 0.0

# Url
url_color   #cc0000
url_style   single

# Titre fenêtre sobre
title_template "{title}"
